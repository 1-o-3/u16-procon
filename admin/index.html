<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>U-16 SHIZUOKA | Q&A 管理ダッシュボード</title>
    <link rel="icon" type="image/png" href="../logo.png">
    <link rel="stylesheet" href="../style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Noto+Sans+JP:wght@300;400;700;900&display=swap"
        rel="stylesheet">
    <style>
        .admin-container {
            margin-top: 100px;
            padding-bottom: 100px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        th,
        td {
            padding: 15px;
            text-align: left;
            border-bottom: 1px solid var(--glass-border);
        }

        th {
            background: rgba(255, 255, 255, 0.05);
            color: var(--secondary);
            font-weight: 600;
        }

        .action-btns {
            display: flex;
            gap: 10px;
        }

        .action-btn {
            background: none;
            border: 1px solid var(--glass-border);
            color: white;
            padding: 5px 10px;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.8rem;
        }

        .action-btn:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .action-btn.delete {
            color: #ff4b4b;
            border-color: rgba(255, 75, 75, 0.3);
        }

        .action-btn.delete:hover {
            background: rgba(255, 75, 75, 0.1);
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            z-index: 2000;
            align-items: center;
            justify-content: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: var(--bg-dark);
            border: 1px solid var(--glass-border);
            border-radius: 15px;
            padding: 40px;
            width: 100%;
            max-width: 600px;
        }

        .modal h3 {
            margin-bottom: 20px;
            color: var(--secondary);
            font-size: 1.5rem;
        }

        .status-msg {
            margin-top: 15px;
            padding: 10px;
            border-radius: 5px;
            display: none;
        }

        .status-msg.success {
            background: rgba(0, 168, 107, 0.2);
            color: #00a86b;
            display: block;
        }

        .status-msg.error {
            background: rgba(255, 75, 75, 0.2);
            color: #ff4b4b;
            display: block;
        }

        /* Login Overlay */
        #login-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg-dark);
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-box {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--glass-border);
            padding: 40px;
            border-radius: 15px;
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        .login-box h2 {
            margin-bottom: 20px;
            background: var(--gradient);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        #admin-main-content {
            display: none;
            /* Hidden until logged in */
        }
    </style>
</head>

<body>
    <!-- Login Screen -->
    <div id="login-overlay">
        <div class="login-box glass">
            <h2>Admin Login</h2>
            <p style="color: var(--text-dim); margin-bottom: 20px; font-size: 0.9rem;">管理画面にアクセスするにはログインしてください。</p>
            <form id="login-form">
                <div class="form-group" style="text-align: left;">
                    <label for="login-id">ID</label>
                    <input type="text" id="login-id" required>
                </div>
                <div class="form-group" style="text-align: left; margin-bottom: 30px;">
                    <label for="login-pass">パスワード</label>
                    <input type="password" id="login-pass" required>
                </div>
                <div id="login-error" style="color: #ff4b4b; margin-bottom: 15px; font-size: 0.85rem; display: none;">
                    IDまたはパスワードが違います</div>
                <button type="submit" class="btn-glow" style="width: 100%;">ログイン</button>
            </form>
            <div style="margin-top: 20px;">
                <a href="../qa/index.html" style="color: var(--text-dim); font-size: 0.8rem;">Q&Aページに戻る</a>
            </div>
        </div>
    </div>

    <div id="admin-main-content">
        <header id="main-header" style="background: rgba(10, 11, 30, 0.95); padding: 15px 0;">
            <div class="container">
                <div class="logo">
                    <a href="../index.html"
                        style="text-decoration: none; display: flex; align-items: center; gap:15px;">
                        <img src="../logo.png" alt="Logo" style="height: 40px;">
                        <span
                            style="font-weight: 800; font-size: 1.2rem; background: var(--gradient); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;">U-16
                            ADMIN</span>
                    </a>
                </div>
                <nav>
                    <ul style="align-items: center;">
                        <li><a href="../qa/index.html">Q&Aページを見る</a></li>
                        <li><a href="../index.html">ホームに戻る</a></li>
                        <li><a href="#" id="logout-btn" style="color: #ff4b4b; margin-left: 20px;">ログアウト</a></li>
                    </ul>
                </nav>
            </div>
        </header>

        <main class="admin-container container">
            <div class="section-title">
                <span class="subtitle">DASHBOARD</span>
                <h2>Q&A 管理</h2>
                <div class="title-line"></div>
            </div>

            <div class="glass" style="margin-bottom: 30px;">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                    <h3>登録済みのQ&A一覧</h3>
                    <button id="add-new-btn" class="btn-glow">新規追加</button>
                </div>
                <div id="status-container"></div>

                <div style="overflow-x: auto;">
                    <table id="qa-table">
                        <thead>
                            <tr>
                                <th style="width: 50px;">ID</th>
                                <th style="width: 150px;">ジャンル</th>
                                <th>質問</th>
                                <th style="width: 120px;">操作</th>
                            </tr>
                        </thead>
                        <tbody id="qa-tbody">
                            <tr>
                                <td colspan="4" style="text-align: center; color: var(--text-dim);">読み込み中...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>

        <!-- Add/Edit Modal -->
        <div class="modal" id="qa-modal">
            <div class="modal-content">
                <h3 id="modal-title">Q&Aの追加</h3>
                <form id="qa-form">
                    <input type="hidden" id="entry-id" name="id">
                    <div class="form-group">
                        <label for="category">ジャンル</label>
                        <select id="category" name="category" required
                            style="width: 100%; padding: 12px; background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border); border-radius: 8px; color: white;">
                            <option value="">ジャンルを選択してください</option>
                            <option value="参加資格について">参加資格について</option>
                            <option value="部門全体について">部門全体について</option>
                            <option value="競技部門について">競技部門について</option>
                            <option value="作品部門について">作品部門について</option>
                            <option value="審査について">審査について</option>
                            <option value="大会当日について">大会当日について</option>
                            <option value="その他">その他</option>
                        </select>
                    </div>
                    <!-- 簡易的にカテゴリIDは1としておくなど。本格運用時はマスタ管理 -->
                    <input type="hidden" id="category_id" name="category_id" value="1">
                    <div class="form-group">
                        <label for="question">質問</label>
                        <input type="text" id="question" name="question" required>
                    </div>
                    <div class="form-group">
                        <label for="answer">回答・解決法</label>
                        <textarea id="answer" name="answer" rows="5" required></textarea>
                    </div>
                    <div class="form-actions" style="margin-top: 30px;">
                        <button type="button" id="cancel-btn" class="btn-outline">キャンセル</button>
                        <button type="submit" class="btn-glow">保存する</button>
                    </div>
                </form>
            </div>
        </div>
    </div> <!-- Close admin-main-content wrapper -->

    <script src="admin.js"></script>
</body>

</html>
